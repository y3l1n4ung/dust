name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  installers:
    name: Installers / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Bash installer
        if: matrix.shell == 'bash'
        shell: bash
        run: bash -n install.sh

      - name: Validate PowerShell installer
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $source = Get-Content -Raw install.ps1
          $null = [scriptblock]::Create($source)

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format check
        run: ./scripts/rust/format.sh --check

      - name: Install cargo-nextest
        uses: taiki-e/install-action@16a76bb73558798e4218983c40c25fee9f2f99a8 # nextest

      - name: Test
        run: ./scripts/rust/test.sh

      - name: Clippy
        run: ./scripts/rust/lint.sh

  dart-packages:
    name: Dart / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dust_dart
            path: packages/dust_dart
            dust_check: ''
          - name: dust_db_sqlite3
            path: packages/dust_db_sqlite3
            dust_check: ''
          - name: product_showcase
            path: examples/product_showcase
            dust_check: examples/product_showcase
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter SDK for mixed workspace resolution
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Rust toolchain
        if: matrix.dust_check != ''
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Disable Dart analytics
        run: dart --disable-analytics

      - name: Pub get
        working-directory: ${{ matrix.path }}
        run: dart pub get

      - name: Dust clean build
        if: matrix.dust_check != ''
        run: cargo run --quiet -p dust_cli -- build --clean --root ${{ matrix.dust_check }}

      - name: Analyze
        working-directory: ${{ matrix.path }}
        run: dart analyze --fatal-infos

      - name: Test
        working-directory: ${{ matrix.path }}
        run: dart test

  flutter-packages:
    name: Flutter / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dust_flutter
            path: packages/dust_flutter
            dust_check: ''
            db_check: false
          - name: benchmark_project
            path: examples/benchmark_project
            dust_check: examples/benchmark_project
            db_check: false
          - name: shopping_app
            path: examples/shopping_app
            dust_check: examples/shopping_app
            db_check: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Rust toolchain
        if: matrix.dust_check != '' || matrix.db_check
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Disable Dart analytics
        run: dart --disable-analytics

      - name: Pub get
        working-directory: ${{ matrix.path }}
        run: flutter --suppress-analytics pub get

      - name: Generate benchmark fixtures
        if: matrix.path == 'examples/benchmark_project'
        working-directory: examples/benchmark_project
        run: dart tool/generate.dart --count 10

      - name: Build benchmark generated outputs
        if: matrix.path == 'examples/benchmark_project'
        run: cargo run --quiet -p dust_cli -- build --clean --root examples/benchmark_project

      - name: Dust clean build
        if: matrix.dust_check != '' && matrix.path != 'examples/benchmark_project'
        run: cargo run --quiet -p dust_cli -- build --clean --root ${{ matrix.dust_check }}

      - name: Dust DB build
        if: matrix.db_check
        run: cargo run --quiet -p dust_cli -- build --root ${{ matrix.path }} --db

      - name: Analyze
        working-directory: ${{ matrix.path }}
        run: flutter --suppress-analytics analyze --no-pub

      - name: Test
        working-directory: ${{ matrix.path }}
        run: flutter --suppress-analytics test

  serde-analyze:
    name: SerDe analyzer fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter SDK for Dart tooling
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Disable Dart analytics
        run: dart --disable-analytics

      - name: Pub get
        working-directory: fixtures/serde_json_app
        run: dart pub get

      - name: Dust clean build
        run: cargo run --quiet -p dust_cli -- build --clean --root fixtures/serde_json_app

      - name: Analyze generated SerDe output
        working-directory: fixtures/serde_json_app
        run: dart analyze --fatal-infos

      - name: Test generated SerDe runtime
        working-directory: fixtures/serde_json_app
        run: dart test

  benchmark:
    name: Benchmark / benchmark_project
    runs-on: ubuntu-latest
    env:
      DUST_PERF_COLD_MAX_MS: 3500
      DUST_PERF_WARM_MAX_MS: 1500
      DUST_PERF_INVALIDATED_MAX_MS: 3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Pub get
        working-directory: examples/benchmark_project
        run: flutter --suppress-analytics pub get

      - name: Build release CLI
        run: cargo build --quiet -p dust_cli --release

      - name: Run ignored perf test
        env:
          DUST_PERF_CLI_BIN: target/release/dust
        run: cargo test -p dust_cli benchmark_project_release_build_benchmark -- --ignored --nocapture
