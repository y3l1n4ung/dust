name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  installers:
    name: Installers / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Bash installer
        if: matrix.shell == 'bash'
        shell: bash
        run: bash -n install.sh

      - name: Validate PowerShell installer
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $source = Get-Content -Raw install.ps1
          $null = [scriptblock]::Create($source)

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format check
        run: cargo fmt --all --check

      - name: Test
        run: cargo test --workspace --quiet

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  derive-annotation:
    name: Dart / derive_annotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Pub get
        working-directory: packages/derive_annotation
        run: dart pub get

      - name: Analyze
        working-directory: packages/derive_annotation
        run: dart analyze

      - name: Test
        working-directory: packages/derive_annotation
        run: dart test

  derive-serde-annotation:
    name: Dart / derive_serde_annotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Pub get
        working-directory: packages/derive_serde_annotation
        run: dart pub get

      - name: Analyze
        working-directory: packages/derive_serde_annotation
        run: dart analyze

      - name: Test
        working-directory: packages/derive_serde_annotation
        run: dart test

  product-showcase:
    name: Dart / product_showcase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Pub get
        working-directory: examples/product_showcase
        run: dart pub get

      - name: Build generated outputs
        run: cargo run -p dust_cli -- build --root examples/product_showcase

      - name: Analyze
        working-directory: examples/product_showcase
        run: dart analyze

      - name: Test
        working-directory: examples/product_showcase
        run: dart test

  stress-project-generated-dart:
    name: Dart Smoke / stress_project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Pub get
        working-directory: examples/stress_project
        run: dart pub get

      - name: Generate stress fixtures
        working-directory: examples/stress_project
        run: ./generate.sh --count 64

      - name: Build generated outputs
        run: cargo run -p dust_cli -- build --root examples/stress_project

      - name: Analyze
        working-directory: examples/stress_project
        run: dart analyze

      - name: Test
        working-directory: examples/stress_project
        run: dart test

  stress-project-benchmark:
    name: Benchmark / stress_project
    runs-on: ubuntu-latest
    env:
      DUST_PERF_COLD_MAX_MS: 3500
      DUST_PERF_WARM_MAX_MS: 1500
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run ignored perf test
        run: cargo test -p dust_cli stress_project_release_build_benchmark -- --ignored --nocapture
