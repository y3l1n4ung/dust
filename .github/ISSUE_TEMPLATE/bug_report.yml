name: Bug Report
description: Report a bug to help us improve Dust.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Please provide a minimal Dart code snippet or a repository link that reproduces the issue.
      placeholder: |
        @Derive([Eq()])
        class MyClass { ... }
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen vs what actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Dust Version
      description: Run `dust --version` and paste the output here.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
